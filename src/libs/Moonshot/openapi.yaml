			"KimiK3ChatRequest": {
				"title": "kimi-k3",
				"allOf": [
					{
						"$ref": "#/components/schemas/ChatRequestCommon"
					},
					{
						"type": "object",
						"properties": {
							"model": {
								"type": "string",
								"description": "Model ID",
								"enum": [
									"kimi-k3"
								],
								"default": "kimi-k3"
							},
							"messages": {
								"type": "array",
								"description": "A list of Kimi K3 conversation messages. In addition to standard messages, you can insert a {\"role\": \"system\", \"tools\": [...]} message at any conversation position to dynamically load tools. A dynamic tool message omits content and only affects subsequent conversation turns.",
								"items": {
									"$ref": "#/components/schemas/KimiK3Message"
								}
							},
							"reasoning_effort": {
								"type": "string",
								"enum": [
									"low",
									"high",
									"max"
								],
								"default": "max",
								"description": "Kimi K3 always enables thinking with Preserved Thinking. Reasoning effort supports low, high, and max, with max as the default."
							}
						},
						"required": [
							"model",
							"messages"
						]
					}
				]
			},
			"MoonshotV1ChatRequest": {
				"title": "moonshot-v1",
				"allOf": [
					{
						"$ref": "#/components/schemas/ChatRequestBase"
					},
					{
						"type": "object",
						"properties": {
							"model": {
								"type": "string",
								"description": "Model ID",
								"enum": [
									"moonshot-v1-8k",
									"moonshot-v1-32k",
									"moonshot-v1-128k",
									"moonshot-v1-auto",
									"moonshot-v1-8k-vision-preview",
									"moonshot-v1-32k-vision-preview",
									"moonshot-v1-128k-vision-preview"
								],
								"default": "moonshot-v1-128k"
							},
							"temperature": {
								"type": "number",
								"format": "float",
								"description": "The sampling temperature to use, ranging from 0 to 1. A higher value (e.g., 0.7) will make the output more random, while a lower value (e.g., 0.2) will make it more focused and deterministic. Default is 0.0.",
								"default": 0.0,
								"minimum": 0,
								"maximum": 1
							},
