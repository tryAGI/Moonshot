{
	"openapi": "3.1.0",
	"info": {
		"title": "Moonshot AI API",
		"version": "1.0.0",
		"description": "API for Moonshot AI / Kimi large language model services"
	},
	"servers": [
		{
			"url": "https://api.moonshot.ai",
			"description": "Production"
		}
	],
	"components": {
		"securitySchemes": {
			"bearerAuth": {
				"type": "http",
				"scheme": "bearer",
				"description": "The Authorization header expects a Bearer token. Use an MOONSHOT_API_KEY as the token. This is a server-side secret key. Generate one on the [API keys page](https://platform.kimi.ai/console/api-keys) in your dashboard."
			}
		},
		"schemas": {
			"Message": {
				"type": "object",
				"properties": {
					"role": {
						"type": "string",
						"enum": [
							"system",
							"user",
							"assistant",
							"tool"
						],
						"example": "user",
						"description": "The role of the message sender. Supports system, user, assistant, tool."
					},
					"content": {
						"oneOf": [
							{
								"type": "string"
							},
							{
								"type": "array",
								"items": {
									"oneOf": [
										{
											"title": "text",
											"type": "object",
											"properties": {
												"type": {
													"type": "string",
													"enum": [
														"text"
													]
												},
												"text": {
													"type": "string"
												}
											},
											"required": [
												"type",
												"text"
											]
										},
										{
											"title": "image_url",
											"type": "object",
											"properties": {
												"type": {
													"type": "string",
													"enum": [
														"image_url"
													]
												},
												"image_url": {
													"oneOf": [
														{
															"type": "object",
															"properties": {
																"url": {
																	"type": "string"
																}
															},
															"required": [
																"url"
															]
														},
														{
															"type": "string"
														}
													]
												}
											},
											"required": [
												"type",
												"image_url"
											]
										},
										{
											"title": "video_url",
											"type": "object",
											"properties": {
												"type": {
													"type": "string",
													"enum": [
														"video_url"
													]
												},
												"video_url": {
													"oneOf": [
														{
															"type": "object",
															"properties": {
																"url": {
																	"type": "string"
																}
															},
															"required": [
																"url"
															]
														},
														{
															"type": "string"
														}
													]
												}
											},
											"required": [
												"type",
												"video_url"
											]
										}
									]
								}
							}
						],
						"example": "Hello",
						"description": "The content of the message. Can be a plain text string, or an array of objects with text/image_url/video_url types (for multimodal input)"
					},
					"name": {
						"type": "string",
						"default": null,
						"description": "Optional name for the message sender"
					},
					"partial": {
						"type": "boolean",
						"default": false,
						"description": "Enable Partial Mode by setting this to true in the last assistant message"
					}
				},
				"required": [
					"role",
					"content"
				]
			},
			"ToolDefinition": {
				"type": "object",
				"properties": {
					"type": {
						"type": "string",
						"enum": [
							"function"
						]
					},
					"function": {
						"type": "object",
						"properties": {
							"name": {
								"type": "string",
								"description": "Function name. Must follow the regex: ^[a-zA-Z_][a-zA-Z0-9-_]{2,63}$",
								"pattern": "^[a-zA-Z_][a-zA-Z0-9-_]{2,63}$"
							},
							"description": {
								"type": "string",
								"description": "Description of what the function does"
							},
							"parameters": {
								"type": "object",
								"description": "Function parameters as JSON Schema. Must conform to the [MFJS (Moonshot Flavored JSON Schema) specification](https://github.com/MoonshotAI/walle/blob/main/docs/mfjs-spec.md).",
								"additionalProperties": true
							},
							"strict": {
								"type": "boolean",
								"default": true,
								"description": "Whether to strictly constrain tool call arguments according to the parameters schema. Defaults to true. When false, only guarantees the output is a valid JSON object without enforcing internal structure."
							}
						},
						"required": [
							"name",
							"parameters"
						]
					}
				},
				"required": [
					"type",
					"function"
				]
			},
			"KimiK3DynamicToolMessage": {
				"type": "object",
				"description": "A Kimi K3 dynamic tool loading message. This message must use the system role, declares tools available to subsequent conversation turns from its position, and does not include a content field.",
				"properties": {
					"role": {
						"type": "string",
						"enum": [
							"system"
						],
						"description": "The role of a dynamic tool loading message. Always system."
					},
					"tools": {
						"type": "array",
						"description": "Tools available for the model to call from this message onward",
						"items": {
							"$ref": "#/components/schemas/ToolDefinition"
						}
					}
				},
				"required": [
					"role",
					"tools"
				],
				"additionalProperties": false
			},
			"KimiK3Message": {
				"oneOf": [
					{
						"title": "Standard message",
						"$ref": "#/components/schemas/Message"
					},
					{
						"title": "Dynamic tool message",
						"$ref": "#/components/schemas/KimiK3DynamicToolMessage"
					}
				],
				"description": "A Kimi K3 conversation message. Supports both standard messages and system messages that omit content and declare dynamically loaded tools through tools."
			},
			"ChatRequestCommon": {
				"type": "object",
				"properties": {
					"logprobs": {
						"type": "boolean",
						"default": false,
						"description": "Whether to return log probabilities of the output tokens. If true, the log probability of each output token is returned in the logprobs field of the response message."
					},
					"top_logprobs": {
						"type": "integer",
						"minimum": 0,
						"maximum": 20,
						"description": "An integer between 0 and 20 specifying the number of most likely tokens to return at each token position, each with an associated log probability. logprobs must be set to true when this parameter is used."
					},
					"prediction": {
						"type": "object",
						"description": "Configuration for a Predicted Output, which can greatly improve response times when large parts of the model response are known ahead of time (for example, regenerating a file with only minor changes).",
						"properties": {
							"type": {
								"type": "string",
								"enum": [
									"content"
								],
								"description": "The type of the predicted content. Currently only content is supported."
							},
							"content": {
								"oneOf": [
									{
										"type": "string"
									},
									{
										"type": "array",
										"items": {
											"type": "object"
										}
									}
								],
								"description": "The static predicted output content that should be matched when generating the model response, such as the content of a text file being regenerated. Accepts a string or an array of content parts (text parts only)."
							}
						}
					},
					"max_tokens": {
						"type": "integer",
						"deprecated": true,
						"description": "Deprecated, please refer to max_completion_tokens"
					},
					"max_completion_tokens": {
						"type": "integer",
						"description": "The maximum number of tokens to generate for the chat completion. The default varies by model: for Kimi K3 it defaults to 131072 and can be set up to 1048576. If the result reaches the maximum number of tokens without ending, the finish reason will be \"length\"; otherwise, it will be \"stop\". This refers to the length of tokens you expect us to return, not the total length of input plus output. If input plus max_completion_tokens exceeds the model context window, the API returns invalid_request_error."
					},
					"response_format": {
						"type": "object",
						"description": "Controls the model output format. Default is {\"type\": \"text\"} for plain text output. Set to {\"type\": \"json_object\"} to enable JSON mode, ensuring output is a valid JSON object (you must guide the model to output JSON in the prompt). Set to {\"type\": \"json_schema\"} to enable Structured Output, constraining output to match a specified JSON Schema (recommended, requires the json_schema field). If you encounter schema validation issues, please submit feedback at walle GitHub Issues (https://github.com/MoonshotAI/walle/issues).",
						"properties": {
							"type": {
								"type": "string",
								"enum": [
									"text",
									"json_object",
									"json_schema"
								],
								"description": "Output format type. text: default, plain text output; json_object: ensures output is a valid JSON object; json_schema: constrains output to match a specified JSON Schema (recommended, requires the json_schema field)"
							},
							"json_schema": {
								"type": "object",
								"description": "Used when type is json_schema. Defines the JSON Schema that the output should conform to.",
								"properties": {
									"name": {
										"type": "string",
										"description": "Schema name for identification"
									},
									"strict": {
										"type": "boolean",
										"default": true,
										"description": "Whether to strictly constrain output according to the schema. Defaults to true. When true, the schema must conform to the MFJS specification; non-conforming schemas will return errors or warnings. When false, only guarantees the output is a valid JSON object without enforcing internal structure."
									},
									"schema": {
										"type": "object",
										"description": "The JSON Schema object defining the structure the output should conform to. Must conform to MFJS (Moonshot Flavored JSON Schema) specification. You can use the walle CLI tool to validate: go install github.com/moonshotai/walle/cmd/walle@latest && walle -schema 'your_schema' -level strict",
										"additionalProperties": true
									}
								},
								"required": [
									"name",
									"schema"
								]
							}
						}
					},
					"stop": {
						"oneOf": [
							{
								"type": "string"
							},
							{
								"type": "array",
								"items": {
									"type": "string"
								},
								"maxItems": 5
							}
						],
						"default": null,
						"description": "Stop words, which will halt the output when a full match is found. The matched words themselves will not be output. A maximum of 5 strings is allowed, and each string must not exceed 32 bytes"
					},
					"stream": {
						"type": "boolean",
						"default": false,
						"description": "Whether to return the response in a streaming fashion. Default is false."
					},
					"stream_options": {
						"type": "object",
						"description": "Options for streaming responses",
						"properties": {
							"include_usage": {
								"type": "boolean",
								"default": false,
								"description": "If set, an additional chunk will be streamed before the data: [DONE] message. The usage field on this chunk shows the token usage statistics for the entire request, and the choices field will always be an empty array. All other chunks will also include a usage field, but with a null value. NOTE: If the stream is interrupted, you may not receive the final usage chunk which contains the total token usage for the request"
							}
						}
					},
					"tools": {
						"type": "array",
						"description": "A list of tools the model may call",
						"items": {
							"$ref": "#/components/schemas/ToolDefinition"
						}
					},
					"prompt_cache_key": {
						"type": "string",
						"default": null,
						"description": "Used to cache responses for similar requests to optimize cache hit rates. For Coding Agents, this is typically a session id or task id representing a single session; if the session is exited and later resumed, this value should remain the same. For Kimi Code Plan, this field is required to improve cache hit rates. For other agents involving multi-turn conversations, it is also recommended to implement this field"
					},
					"safety_identifier": {
						"type": "string",
						"description": "A stable identifier used to help detect users of your application that may be violating usage policies. The ID should be a string that uniquely identifies each user. It is recommended to hash the username or email address to avoid sending any identifying information"
					},
					"tool_choice": {
						"oneOf": [
							{
								"type": "string",
								"enum": [
									"auto",
									"none",
									"required"
								],
								"description": "auto: the model decides whether to call tools; none: no tool calls; required: force a tool call"
							},
							{
								"type": "object",
								"description": "Force a specific tool call",
								"properties": {
									"type": {
										"type": "string",
										"enum": [
											"function"
										]
									},
									"function": {
										"type": "object",
										"properties": {
											"name": {
												"type": "string",
												"description": "The name of the function to call"
											}
										},
										"required": [
											"name"
										]
									}
								},
								"required": [
									"type",
									"function"
								]
							}
						],
						"description": "Controls whether the model calls tools. `auto` (default): the model decides whether to call tools; `none`: no tool calls; `required`: force a tool call; or pass an object specifying a particular function to force that tool call."
					}
				}
			},
			"ChatRequestBase": {
				"type": "object",
				"properties": {
					"logprobs": {
						"type": "boolean",
						"default": false,
						"description": "Whether to return log probabilities of the output tokens. If true, the log probability of each output token is returned in the logprobs field of the response message."
					},
					"top_logprobs": {
						"type": "integer",
						"minimum": 0,
						"maximum": 20,
						"description": "An integer between 0 and 20 specifying the number of most likely tokens to return at each token position, each with an associated log probability. logprobs must be set to true when this parameter is used."
					},
					"prediction": {
						"type": "object",
						"description": "Configuration for a Predicted Output, which can greatly improve response times when large parts of the model response are known ahead of time (for example, regenerating a file with only minor changes).",
						"properties": {
							"type": {
								"type": "string",
								"enum": [
									"content"
								],
								"description": "The type of the predicted content. Currently only content is supported."
							},
							"content": {
								"oneOf": [
									{
										"type": "string"
									},
									{
										"type": "array",
										"items": {
											"type": "object"
										}
									}
								],
								"description": "The static predicted output content that should be matched when generating the model response, such as the content of a text file being regenerated. Accepts a string or an array of content parts (text parts only)."
							}
						}
					},
					"messages": {
						"type": "array",
						"description": "A list of messages in the conversation so far. Each element has the format {\"role\": \"user\", \"content\": \"Hello\"}. role supports system, user, assistant, or tool. content must not be empty. The content field can be a string or an array[object] (for multimodal input).",
						"items": {
							"$ref": "#/components/schemas/Message"
						}
					},
					"max_tokens": {
						"type": "integer",
						"deprecated": true,
						"description": "Deprecated, please refer to max_completion_tokens"
					},
					"max_completion_tokens": {
						"type": "integer",
						"description": "The maximum number of tokens to generate for the chat completion. The default varies by model: for Kimi K3 it defaults to 131072 and can be set up to 1048576. If the result reaches the maximum number of tokens without ending, the finish reason will be \"length\"; otherwise, it will be \"stop\". This refers to the length of tokens you expect us to return, not the total length of input plus output. If input plus max_completion_tokens exceeds the model context window, the API returns invalid_request_error."
					},
					"response_format": {
						"type": "object",
						"description": "Controls the model output format. Default is {\"type\": \"text\"} for plain text output. Set to {\"type\": \"json_object\"} to enable JSON mode, ensuring output is a valid JSON object (you must guide the model to output JSON in the prompt). Set to {\"type\": \"json_schema\"} to enable Structured Output, constraining output to match a specified JSON Schema (recommended, requires the json_schema field). If you encounter schema validation issues, please submit feedback at walle GitHub Issues (https://github.com/MoonshotAI/walle/issues).",
						"properties": {
							"type": {
								"type": "string",
								"enum": [
									"text",
									"json_object",
									"json_schema"
								],
								"description": "Output format type. text: default, plain text output; json_object: ensures output is a valid JSON object; json_schema: constrains output to match a specified JSON Schema (recommended, requires the json_schema field)"
							},
							"json_schema": {
								"type": "object",
								"description": "Used when type is json_schema. Defines the JSON Schema that the output should conform to.",
								"properties": {
									"name": {
										"type": "string",
										"description": "Schema name for identification"
									},
									"strict": {
										"type": "boolean",
										"default": true,
										"description": "Whether to strictly constrain output according to the schema. Defaults to true. When true, the schema must conform to the MFJS specification; non-conforming schemas will return errors or warnings. When false, only guarantees the output is a valid JSON object without enforcing internal structure."
									},
									"schema": {
